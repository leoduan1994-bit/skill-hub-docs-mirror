<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外贸 AI 助手 · 开发信 / 询盘回复</title>
<style>
  :root{
    --bg:#0b1020; --panel:#121a31; --panel2:#0f1729; --line:#243149;
    --txt:#e7ecf5; --mut:#93a0bd; --pri:#4f7cff; --pri2:#6e9bff;
    --ok:#22c55e; --warn:#f59e0b; --rad:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Segoe UI,Roboto,sans-serif;
    background:linear-gradient(180deg,#0b1020,#0a0f1e);color:var(--txt);line-height:1.6}
  .wrap{max-width:1080px;margin:0 auto;padding:24px 18px 64px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--pri),#9b6bff);
    display:flex;align-items:center;justify-content:center;font-size:20px}
  h1{font-size:18px;margin:0}
  .sub{font-size:12px;color:var(--mut)}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--txt);padding:9px 14px;border-radius:10px;
    cursor:pointer;font-size:13px;transition:.15s}
  .btn:hover{border-color:var(--pri)}
  .btn.pri{background:linear-gradient(135deg,var(--pri),var(--pri2));border:0;font-weight:600}
  .btn.pri:disabled{opacity:.5;cursor:not-allowed}
  .tabs{display:flex;gap:8px;margin:6px 0 18px}
  .tab{padding:10px 16px;border-radius:10px;border:1px solid var(--line);background:var(--panel);cursor:pointer;font-size:14px}
  .tab.on{background:linear-gradient(135deg,var(--pri),var(--pri2));border:0;font-weight:600}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);padding:18px}
  .card h2{font-size:14px;margin:0 0 14px;color:var(--mut);font-weight:600;letter-spacing:.3px}
  label{display:block;font-size:12.5px;color:var(--mut);margin:12px 0 5px}
  input,textarea,select{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:10px 12px;font-size:13.5px;font-family:inherit;resize:vertical}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--pri)}
  textarea{min-height:74px}
  .row{display:flex;gap:10px}.row>*{flex:1}
  .hint{font-size:11px;color:var(--mut);margin-top:4px}
  .out{white-space:normal;min-height:200px}
  .out h3{font-size:15px;margin:18px 0 6px;color:var(--pri2)}
  .out h4{font-size:13px;margin:14px 0 4px;color:var(--mut)}
  .out p{margin:6px 0}.out ul{margin:6px 0;padding-left:20px}
  .out hr{border:0;border-top:1px solid var(--line);margin:16px 0}
  .out strong{color:var(--txt)}
  .block{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:10px 0;position:relative}
  .copy{position:absolute;top:8px;right:8px;font-size:11px;padding:4px 9px}
  .empty{color:var(--mut);font-size:13px;text-align:center;padding:40px 0}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:s .7s linear infinite;vertical-align:-3px;margin-right:6px}
  @keyframes s{to{transform:rotate(360deg)}}
  dialog{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:16px;padding:22px;max-width:440px;width:92%}
  dialog::backdrop{background:rgba(0,0,0,.6)}
  .foot{margin-top:26px;font-size:11.5px;color:var(--mut);text-align:center;line-height:1.8}
  .chip{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:3px 10px;font-size:11px;margin:2px}
  .err{background:#3b1518;border:1px solid #7f1d1d;color:#fca5a5;padding:10px 12px;border-radius:10px;font-size:12.5px;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">✉️</div>
      <div>
        <h1>外贸 AI 助手</h1>
        <div class="sub">开发信 · 询盘回复 · 跟进序列 — 把海外销售打法变成一键交付</div>
      </div>
    </div>
    <button class="btn" id="setBtn">⚙️ 模型设置</button>
  </header>

  <div class="tabs">
    <div class="tab on" data-tab="cold">📤 写开发信</div>
    <div class="tab" data-tab="reply">📥 回复询盘 / 邮件</div>
  </div>

  <div class="grid">
    <!-- INPUT -->
    <div class="card">
      <h2>输入</h2>
      <!-- COLD -->
      <div id="form-cold">
        <label>你的产品 / 服务 *</label>
        <textarea id="c_product" placeholder="例：LED 户外照明灯具，主打高防水 IP66、5 年质保，工厂直供"></textarea>
        <label>公司背景 / 可信度（年限、认证、知名客户、MOQ、产能）</label>
        <textarea id="c_cred" placeholder="例：12 年工厂经验，CE/RoHS 认证，已供货欧洲连锁超市，MOQ 500 件"></textarea>
        <label>目标客户（行业 + 角色 + 地区）*</label>
        <input id="c_target" placeholder="例：德国 / 户外用品进口商 / 采购经理">
        <label>客户可能的痛点或需求</label>
        <textarea id="c_pain" placeholder="例：现有供应商交期不稳、退货率高、想找有认证的稳定货源"></textarea>
        <label>核心卖点 / 差异化</label>
        <textarea id="c_value" placeholder="例：交期 25 天稳定、不良率<0.5%、支持贴牌"></textarea>
        <div class="row">
          <div><label>期望客户做的动作（CTA）</label>
            <select id="c_cta">
              <option>回复表达兴趣 / 索取报价单</option><option>预约 15 分钟视频会</option>
              <option>索取免费样品</option><option>加 WhatsApp / 微信深聊</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div><label>语气</label>
            <select id="c_tone"><option>专业稳重</option><option>热情亲切</option><option>简洁直接</option></select>
          </div>
          <div><label>语言</label>
            <select id="c_lang"><option>英语</option><option>西班牙语</option><option>法语</option><option>德语</option><option>葡萄牙语</option><option>阿拉伯语</option><option>俄语</option></select>
          </div>
        </div>
      </div>
      <!-- REPLY -->
      <div id="form-reply" style="display:none">
        <label>粘贴客户的询盘 / 邮件原文 *</label>
        <textarea id="r_inq" style="min-height:130px" placeholder="把客户发来的英文/外文询盘原样粘进来…"></textarea>
        <label>你的产品 / 背景（让回复更精准）</label>
        <textarea id="r_ctx" placeholder="例：我们做不锈钢厨具，FOB 宁波，可贴牌，MOQ 1000"></textarea>
        <label>这封回复你想达成什么 *</label>
        <select id="r_goal">
          <option>专业报价并推进下一步</option><option>先索要更多信息再报价（判断真买家）</option>
          <option>推进寄样 / 打样</option><option>催促客户回复 / 跟进</option>
          <option>处理砍价 / 异议，守住利润</option><option>处理投诉 / 售后，稳住关系</option>
        </select>
        <div class="row">
          <div><label>语气</label><select id="r_tone"><option>专业稳重</option><option>热情亲切</option><option>简洁直接</option></select></div>
          <div><label>回复语言</label><select id="r_lang"><option>跟随客户语言</option><option>英语</option><option>西班牙语</option><option>法语</option><option>德语</option></select></div>
        </div>
      </div>
      <button class="btn pri" id="genBtn" style="width:100%;margin-top:18px;padding:12px">⚡ 生成</button>
      <div id="errBox"></div>
    </div>

    <!-- OUTPUT -->
    <div class="card">
      <h2>结果 <span id="provTag" class="chip" style="float:right"></span></h2>
      <div class="out" id="out"><div class="empty">填好左边，点「生成」。<br>结果会显示英文邮件 + 中文策略点评，可一键复制。</div></div>
    </div>
  </div>

  <div class="foot">
    🔒 你的 API Key 只存在本机浏览器（localStorage），不上传任何服务器。<br>
    💡 信息差变现提示：这个工具是你的「生产力武器」。先用它在闲鱼/小红书接「代写开发信·询盘回复」按件收钱验证需求，再考虑做成订阅工具。
  </div>
</div>

<!-- SETTINGS -->
<dialog id="setDlg">
  <h3 style="margin:0 0 4px">模型设置</h3>
  <p class="sub" style="margin:0 0 14px">国内直连推荐 DeepSeek（便宜、够用、无需海外卡）。</p>
  <label>模型供应商</label>
  <select id="s_prov"></select>
  <label>Base URL</label><input id="s_base">
  <label>模型名</label><input id="s_model">
  <label>API Key</label><input id="s_key" type="password" placeholder="sk-...">
  <div class="hint" id="s_help"></div>
  <div style="display:flex;gap:10px;margin-top:18px;justify-content:flex-end">
    <button class="btn" id="s_cancel">取消</button>
    <button class="btn pri" id="s_save">保存</button>
  </div>
</dialog>

<script>
const PROVIDERS = {
  deepseek:{label:"DeepSeek（推荐·国内直连）",base:"https://api.deepseek.com/chat/completions",model:"deepseek-chat",type:"openai",help:"在 platform.deepseek.com 充值并创建 API Key，几块钱能跑很多封。"},
  kimi:{label:"Kimi / Moonshot",base:"https://api.moonshot.cn/v1/chat/completions",model:"moonshot-v1-8k",type:"openai",help:"platform.moonshot.cn 获取 Key。"},
  qwen:{label:"通义千问（阿里）",base:"https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions",model:"qwen-plus",type:"openai",help:"阿里云 DashScope 开通后获取 Key。"},
  openai:{label:"OpenAI（需海外网络）",base:"https://api.openai.com/v1/chat/completions",model:"gpt-4o",type:"openai",help:"需能访问 api.openai.com。"},
  claude:{label:"Claude / Anthropic（需海外网络）",base:"https://api.anthropic.com/v1/messages",model:"claude-sonnet-4-6",type:"anthropic",help:"需能访问 api.anthropic.com。质量最佳。"},
  custom:{label:"自定义（OpenAI 兼容）",base:"",model:"",type:"openai",help:"填任意 OpenAI 兼容端点。"}
};
const $ = id => document.getElementById(id);
let cfg = JSON.parse(localStorage.getItem("waimao_cfg")||"null") || {prov:"deepseek",...PROVIDERS.deepseek,key:""};

// ---- settings dialog ----
const provSel=$("s_prov");
Object.entries(PROVIDERS).forEach(([k,v])=>provSel.add(new Option(v.label,k)));
function fillSet(){provSel.value=cfg.prov;$("s_base").value=cfg.base;$("s_model").value=cfg.model;$("s_key").value=cfg.key||"";$("s_help").textContent=PROVIDERS[cfg.prov].help;}
provSel.onchange=()=>{const p=PROVIDERS[provSel.value];$("s_base").value=p.base;$("s_model").value=p.model;$("s_help").textContent=p.help;};
$("setBtn").onclick=()=>{fillSet();$("setDlg").showModal();};
$("s_cancel").onclick=()=>$("setDlg").close();
$("s_save").onclick=()=>{cfg={prov:provSel.value,type:PROVIDERS[provSel.value].type,base:$("s_base").value.trim(),model:$("s_model").value.trim(),key:$("s_key").value.trim()};localStorage.setItem("waimao_cfg",JSON.stringify(cfg));$("setDlg").close();updateTag();};
function updateTag(){$("provTag").textContent=cfg.key?(cfg.model||cfg.prov):"未配置 Key";}
updateTag();

// ---- tabs ----
let tab="cold";
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));t.classList.add("on");
  tab=t.dataset.tab;$("form-cold").style.display=tab==="cold"?"":"none";$("form-reply").style.display=tab==="reply"?"":"none";
});

// ---- prompts (核心 IP：把海外 cold-outreach 最佳实践写进去) ----
const SYS_COLD = `You are a world-class B2B export-sales copywriter. You write cold outreach emails for Chinese foreign-trade (外贸) sellers contacting overseas buyers, and these emails are known for getting replies.

Follow these proven principles strictly:
- Open with the BUYER, not yourself: reference their business / market / likely situation. Never start with "We are a manufacturer of...".
- Lead with relevance and value to the buyer; do not dump product specs.
- Keep it SHORT (ideally 70-110 words), scannable, plain language a busy buyer skims in 10 seconds.
- Exactly ONE clear, low-friction call to action.
- Weave in ONE concrete credibility proof naturally (cert / known client / years / MOQ). No vague bragging.
- Subject lines: short, specific, no clickbait, no ALL CAPS, no exclamation marks, avoid spam words (free, guarantee, cheapest).
- Native, natural target-language writing; match the requested tone. Not robotic, not over-formal, no flowery filler.

Output in GitHub markdown, in this exact structure:
## 📌 主题行（3 选 1）
- option 1
- option 2
- option 3
## ✉️ 版本 A（价值导向 / AIDA）
the full email (greeting to signoff)
## ✉️ 版本 B（更短 / 痛点切入 PAS）
the full email
## 🔁 跟进序列（客户没回时，间隔 3-5 天）
**Follow-up 1:** ...
**Follow-up 2:** ...
**Follow-up 3 (breakup):** ...
## 🧭 中文策略点评
2-4 句，用中文说明为什么这么写、发送建议、可优化的点。`;

const SYS_REPLY = `You are a senior B2B export-sales manager helping a Chinese foreign-trade seller reply to an overseas buyer's message. You both qualify the buyer and advance the deal.

Principles:
- First read the buyer's message and judge intent + seriousness (real buyer vs tire-kicker): look at specificity, quantity, company info, urgency.
- Write a reply that moves toward the seller's stated goal, sounds like a confident expert, and asks the RIGHT qualifying questions before over-committing (e.g. don't give final pricing to a vague one-liner).
- Professional, warm, concise. Native target-language. Never desperate, never pushy.
- If handling price objection: defend value, offer options/levers (MOQ, payment terms, specs), don't just cut price.

Output in GitHub markdown, in this exact structure:
## 🔍 买家分析（中文）
- 真实度判断（高/中/低）+ 理由
- 客户真正想要什么
## ✉️ 推荐回复
the full reply email (greeting to signoff)
## ❓ 建议补充确认的问题
- bullets (qualifying questions you should ask)
## 🧭 中文策略提示
2-3 句下一步建议。`;

function buildColdUser(){
  return `Write the cold outreach in: ${$("c_lang").value}.
Tone: ${$("c_tone").value}. Desired CTA: ${$("c_cta").value}.
--- Seller product/service: ${$("c_product").value||"(n/a)"}
--- Company / credibility: ${$("c_cred").value||"(n/a)"}
--- Target buyer (industry/role/region): ${$("c_target").value||"(n/a)"}
--- Buyer pain points / needs: ${$("c_pain").value||"(infer reasonable ones)"}
--- Key selling points / differentiation: ${$("c_value").value||"(infer from product)"}`;
}
function buildReplyUser(){
  return `Reply language: ${$("r_lang").value}. Tone: ${$("r_tone").value}.
Seller's goal for this reply: ${$("r_goal").value}.
--- Seller product/background: ${$("r_ctx").value||"(n/a)"}
--- BUYER'S ORIGINAL MESSAGE:
"""${$("r_inq").value}"""`;
}

// ---- API call ----
async function call(sys,usr){
  if(cfg.type==="anthropic"){
    const r=await fetch(cfg.base,{method:"POST",headers:{"content-type":"application/json","x-api-key":cfg.key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:cfg.model,max_tokens:2200,system:sys,messages:[{role:"user",content:usr}]})});
    const d=await r.json(); if(!r.ok) throw new Error(d.error?.message||JSON.stringify(d));
    return d.content.map(c=>c.text).join("");
  }else{
    const r=await fetch(cfg.base,{method:"POST",headers:{"content-type":"application/json","Authorization":"Bearer "+cfg.key},
      body:JSON.stringify({model:cfg.model,temperature:0.7,max_tokens:2200,messages:[{role:"system",content:sys},{role:"user",content:usr}]})});
    const d=await r.json(); if(!r.ok) throw new Error(d.error?.message||JSON.stringify(d));
    return d.choices[0].message.content;
  }
}

// ---- tiny markdown render ----
function md(t){
  const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const lines=t.split("\n");let html="",ul=false;
  const inline=s=>esc(s).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  for(let ln of lines){
    if(/^\s*[-*]\s+/.test(ln)){if(!ul){html+="<ul>";ul=true;}html+="<li>"+inline(ln.replace(/^\s*[-*]\s+/,""))+"</li>";continue;}
    if(ul){html+="</ul>";ul=false;}
    if(/^###\s/.test(ln))html+="<h4>"+inline(ln.slice(4))+"</h4>";
    else if(/^##\s/.test(ln))html+="<h3>"+inline(ln.slice(3))+"</h3>";
    else if(/^#\s/.test(ln))html+="<h3>"+inline(ln.slice(2))+"</h3>";
    else if(/^---/.test(ln))html+="<hr>";
    else if(ln.trim()==="")html+="";
    else html+="<p>"+inline(ln)+"</p>";
  }
  if(ul)html+="</ul>";
  return html;
}

// ---- generate ----
$("genBtn").onclick=async()=>{
  $("errBox").innerHTML="";
  if(!cfg.key){$("errBox").innerHTML='<div class="err">还没配置 API Key，点右上角「⚙️ 模型设置」。</div>';return;}
  const need = tab==="cold" ? [$("c_product").value,$("c_target").value] : [$("r_inq").value];
  if(need.some(v=>!v.trim())){$("errBox").innerHTML='<div class="err">带 * 的必填项还没填。</div>';return;}
  const btn=$("genBtn");btn.disabled=true;btn.innerHTML='<span class="spin"></span>生成中…';
  $("out").innerHTML='<div class="empty"><span class="spin"></span> AI 正在按海外销售打法撰写…</div>';
  try{
    const raw = tab==="cold" ? await call(SYS_COLD,buildColdUser()) : await call(SYS_REPLY,buildReplyUser());
    $("out").innerHTML='<div class="block"><button class="btn copy" data-raw="1">📋 复制全文</button>'+md(raw)+'</div>';
    $("out").querySelector(".copy").onclick=e=>{navigator.clipboard.writeText(raw);e.target.textContent="✅ 已复制";setTimeout(()=>e.target.textContent="📋 复制全文",1500);};
  }catch(err){
    $("out").innerHTML='<div class="empty">生成失败 😕</div>';
    $("errBox").innerHTML='<div class="err">'+(err.message||err)+'<br><span style="color:var(--mut)">提示：Key 是否正确？余额是否充足？该供应商在你网络下能否访问？</span></div>';
  }finally{btn.disabled=false;btn.innerHTML="⚡ 生成";}
};
</script>
</body>
</html>
