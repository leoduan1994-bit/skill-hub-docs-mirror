<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>黑神话·齐天 — Wukong Arena</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;background:#05040a;overflow:hidden;color:#f0e6d2;
    font-family:"Songti SC","STSong","Noto Serif SC",serif;}
  #wrap{position:fixed;inset:0;}
  canvas{display:block;width:100%;height:100%;}
  /* ---------- HUD ---------- */
  #hud{position:absolute;inset:0;pointer-events:none;z-index:5;}
  .vitals{position:absolute;left:24px;bottom:26px;width:min(40vw,340px);}
  .bar{height:13px;border-radius:7px;background:rgba(0,0,0,.5);
    box-shadow:0 0 0 1px rgba(255,210,120,.25),inset 0 1px 3px #000;overflow:hidden;position:relative;}
  .bar .fill{height:100%;width:100%;transition:width .18s cubic-bezier(.3,.8,.4,1);border-radius:7px;}
  #hpFill{background:linear-gradient(90deg,#7a1410,#e0452a,#ffb047);}
  #qiBar{height:9px;margin-top:7px;width:78%;}
  #qiFill{background:linear-gradient(90deg,#16384e,#2f8fd0,#9fe3ff);}
  .vlabel{font-size:12px;letter-spacing:3px;color:#d8b87a;margin-bottom:5px;
    text-shadow:0 1px 2px #000;display:flex;justify-content:space-between;}
  /* boss bar */
  #bossWrap{position:absolute;top:26px;left:50%;transform:translateX(-50%);
    width:min(74vw,640px);opacity:0;transition:opacity .5s;}
  #bossWrap.on{opacity:1;}
  #bossName{text-align:center;font-size:17px;letter-spacing:8px;color:#ffd9a0;
    text-shadow:0 0 14px #c0381a,0 2px 3px #000;margin-bottom:6px;}
  #bossBar{height:11px;}
  #bossFill{background:linear-gradient(90deg,#5a0c0c,#b5241a,#ff7a3c);
    box-shadow:0 0 16px #ff4a1f;transition:width .12s linear;}
  /* combo + wave banners */
  #combo{position:absolute;right:30px;top:90px;text-align:right;opacity:0;
    transition:opacity .25s;text-shadow:0 2px 6px #000;}
  #combo b{font-size:46px;color:#ffd24a;text-shadow:0 0 18px #ff8a2a,0 3px 4px #000;
    font-style:italic;font-family:"Songti SC",serif;}
  #combo span{display:block;font-size:13px;letter-spacing:4px;color:#e8c98a;}
  #banner{position:absolute;left:0;right:0;top:34%;text-align:center;
    font-size:clamp(30px,8vw,72px);letter-spacing:14px;color:#fff;opacity:0;
    text-shadow:0 0 30px #ff5a2a,0 4px 10px #000;font-weight:700;}
  /* screens */
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;z-index:10;
    background:radial-gradient(120% 90% at 50% 30%,rgba(40,12,10,.55),rgba(4,3,8,.94));
    padding:24px;}
  .screen.hide{display:none;}
  .screen h1{font-size:clamp(44px,12vw,120px);letter-spacing:16px;margin-bottom:6px;
    background:linear-gradient(180deg,#ffe9b0,#ffb347 55%,#c0371a);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 26px rgba(255,120,40,.55)) drop-shadow(0 4px 6px #000);}
  .screen h2{font-size:clamp(13px,3.2vw,18px);letter-spacing:12px;color:#caa86a;
    margin-bottom:30px;font-weight:400;}
  .screen p{color:#b59b74;max-width:560px;line-height:1.9;font-size:14px;margin:5px 0;}
  .cta{margin-top:26px;pointer-events:auto;cursor:pointer;border:none;
    padding:15px 56px;font-size:21px;letter-spacing:8px;color:#1a0e06;font-weight:700;
    font-family:inherit;border-radius:40px;
    background:linear-gradient(180deg,#ffe6a8,#ffb13c 60%,#e8862a);
    box-shadow:0 0 30px rgba(255,150,50,.5),0 8px 20px rgba(0,0,0,.6),inset 0 2px 2px rgba(255,255,255,.6);
    transition:.14s;}
  .cta:hover{transform:translateY(-3px);filter:brightness(1.08);}
  .cta:active{transform:translateY(0);}
  .keys{margin-top:30px;display:grid;grid-template-columns:auto auto;gap:8px 26px;
    font-size:13px;color:#a98f68;pointer-events:none;}
  .keys b{color:#ffd9a0;font-family:monospace;}
  /* touch controls */
  #touch{position:absolute;inset:0;z-index:6;pointer-events:none;display:none;}
  .tbtn{position:absolute;pointer-events:auto;border-radius:50%;
    border:1px solid rgba(255,210,140,.3);background:rgba(20,12,8,.4);
    display:flex;align-items:center;justify-content:center;color:#ffd9a0;
    font-size:15px;backdrop-filter:blur(2px);user-select:none;}
  #tL{left:20px;bottom:96px;width:62px;height:62px;}
  #tR{left:96px;bottom:96px;width:62px;height:62px;}
  #tJump{left:58px;bottom:24px;width:62px;height:62px;}
  #tA{right:22px;bottom:96px;width:74px;height:74px;background:rgba(120,30,20,.4);}
  #tH{right:104px;bottom:40px;width:60px;height:60px;background:rgba(80,40,120,.4);}
  #tDash{right:30px;bottom:18px;width:56px;height:56px;}
  #tSp{right:96px;bottom:120px;width:58px;height:58px;background:rgba(40,90,140,.45);}
  @media (pointer:coarse){ #touch{display:block;} }
  #vig{position:absolute;inset:0;pointer-events:none;z-index:4;
    background:radial-gradient(130% 100% at 50% 42%,transparent 52%,rgba(0,0,0,.7));}
  #flash{position:absolute;inset:0;pointer-events:none;z-index:7;background:#fff;opacity:0;}
  #hint{position:absolute;bottom:6px;left:0;right:0;text-align:center;
    font-size:11px;color:#5a4a38;letter-spacing:2px;z-index:5;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="vig"></div>
  <div id="flash"></div>

  <div id="hud">
    <div id="bossWrap">
      <div id="bossName">妖 王 · 玄 狼</div>
      <div class="bar" id="bossBar"><div class="fill" id="bossFill"></div></div>
    </div>
    <div class="vitals">
      <div class="vlabel"><span>气血 · HP</span><span id="hpNum"></span></div>
      <div class="bar"><div class="fill" id="hpFill"></div></div>
      <div class="bar" id="qiBar"><div class="fill" id="qiFill"></div></div>
    </div>
    <div id="combo"><b id="comboN">0</b><span>连 击</span></div>
    <div id="banner"></div>
  </div>

  <div id="touch">
    <div class="tbtn" id="tL">◀</div>
    <div class="tbtn" id="tR">▶</div>
    <div class="tbtn" id="tJump">跳</div>
    <div class="tbtn" id="tA">棍</div>
    <div class="tbtn" id="tH">重</div>
    <div class="tbtn" id="tDash">闪</div>
    <div class="tbtn" id="tSp">法</div>
  </div>

  <div class="screen" id="start">
    <h1>齊 天</h1>
    <h2>W U K O N G &nbsp; A R E N A</h2>
    <p>持如意金箍棒，于血月之下迎战群妖与妖王。<br>轻重连击、闪身无敌、聚气施法，一棒荡开千军。</p>
    <button class="cta" id="startBtn">入 战</button>
    <div class="keys">
      <span>移动</span><span><b>A / D</b> 或 ← →</span>
      <span>跳跃</span><span><b>W</b> / <b>空格</b></span>
      <span>金箍棒（连击）</span><span><b>J</b></span>
      <span>重击（击飞）</span><span><b>K</b></span>
      <span>闪身（无敌）</span><span><b>L / Shift</b></span>
      <span>法术·棒扫千军（耗气）</span><span><b>I</b></span>
      <span>暂停</span><span><b>P</b></span>
    </div>
  </div>

  <div class="screen hide" id="over">
    <h1 id="overTitle">败</h1>
    <h2 id="overSub">FALLEN</h2>
    <p id="overMsg"></p>
    <button class="cta" id="againBtn">再 战</button>
  </div>

  <div class="screen hide" id="pause">
    <h1 style="letter-spacing:24px;">歇</h1><h2>PAUSED</h2>
    <button class="cta" id="resumeBtn">继 续</button>
  </div>

  <div id="hint">纯本地运行 · Canvas + WebAudio · 黑暗东方奇幻动作</div>
</div>

<script>
"use strict";
//================= 基础 =================//
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const $=id=>document.getElementById(id);
let W=0,H=0,DPR=1,GY=0; // 视口宽高、像素比、地面 y
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
  GY=H*0.82;
}
window.addEventListener('resize',resize); resize();
const rand=(a,b)=>a+Math.random()*(b-a);
const randi=(a,b)=>Math.floor(rand(a,b+1));
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const TAU=Math.PI*2;
const now=()=>performance.now()/1000;

//================= 音效 =================//
let actx=null;
function A(){ if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}} return actx; }
function tone(f,d,type,vol,slide){const a=A();if(!a)return;const o=a.createOscillator(),g=a.createGain();
  o.type=type||'sine';o.frequency.value=f;if(slide)o.frequency.exponentialRampToValueAtTime(slide,a.currentTime+d);
  g.gain.setValueAtTime(vol||.1,a.currentTime);g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);
  o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d);}
function noiz(d,vol,hp){const a=A();if(!a)return;const n=(a.sampleRate*d)|0,b=a.createBuffer(1,n,a.sampleRate),ch=b.getChannelData(0);
  for(let i=0;i<n;i++)ch[i]=(Math.random()*2-1)*(1-i/n);const s=a.createBufferSource();s.buffer=b;
  const g=a.createGain();g.gain.setValueAtTime(vol||.1,a.currentTime);g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);
  let node=s; if(hp){const f=a.createBiquadFilter();f.type='highpass';f.frequency.value=hp;s.connect(f);node=f;}
  node.connect(g);g.connect(a.destination);s.start();}
const SFX={
  swing(){tone(520,.12,'sawtooth',.05,180); noiz(.12,.05,1200);},
  hit(){tone(180,.1,'square',.12,70); noiz(.12,.14,400);},
  heavy(){tone(120,.22,'sawtooth',.16,50); noiz(.2,.16,300);},
  cast(){tone(300,.3,'triangle',.12,900);},
  jump(){tone(380,.14,'sine',.08,720);},
  dash(){noiz(.16,.08,900); tone(620,.12,'sine',.05,300);},
  hurt(){tone(150,.3,'sawtooth',.14,60);},
  die(){tone(90,.6,'sawtooth',.16,40); noiz(.5,.16,200);},
  boss(){tone(70,.8,'sawtooth',.2,46);},
  win(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.4,'triangle',.12),i*140));},
};

//================= 状态 =================//
const ST={MENU:0,PLAY:1,OVER:2,PAUSE:3};
let state=ST.MENU;
let timeScale=1, hitstop=0, shake=0, flashT=0;
const keys={};
let player, enemies=[], slashes=[], parts=[], sparks=[], floats=[], embers=[], souls=[];
let waveIdx=0, spawnTimer=0, boss=null, gameTime=0;
let mountains=[]; // 远山轮廓

//================= 背景生成 =================//
function genMountains(){
  mountains=[];
  for(let layer=0;layer<3;layer++){
    const pts=[]; const baseY=GY+ (layer*0)- (0);
    let x=-50; const step=W/ (6- layer);
    while(x<W+80){ pts.push({x, h:rand(0.18,0.42)*(1-layer*0.18)}); x+=step*rand(.7,1.3); }
    mountains.push({pts, k:0.5+layer*0.22}); // k 越大越近
  }
}
function initEmbers(){ embers=[]; for(let i=0;i<70;i++) embers.push(mkEmber(true)); }
function mkEmber(spread){return {x:rand(0,W), y:spread?rand(0,H):H+10,
  vy:-rand(8,34), vx:rand(-10,10), r:rand(.6,2.4), a:rand(.2,.8), tw:rand(0,TAU)};}

//================= 实体 =================//
function makePlayer(){return {x:W*0.5,y:GY,vy:0,vx:0,face:1,onGround:true,
  hp:100,maxhp:100,qi:0,maxqi:100,
  atk:null,combo:0,comboTimer:0,dash:0,dashCd:0,inv:0,hurt:0,
  legPhase:0,lean:0,armSwing:0,state:'idle',scale:1.0};}

function makeDemon(x,kind){
  const k=kind||'wolf';
  const base={type:'enemy',kind:k,x,y:GY,vy:0,face:x<W/2?1:-1,
    hp:34,maxhp:34,state:'walk',windup:0,atk:0,stun:0,hurt:0,inv:0,
    legPhase:rand(0,TAU),lean:0,dead:0,speed:rand(58,82),scale:rand(.92,1.05),
    reach:64,dmg:9,score:100,eye:'#ff3a2a'};
  if(k==='brute'){Object.assign(base,{hp:80,maxhp:80,speed:rand(40,54),reach:78,dmg:16,score:240,scale:1.35,eye:'#ff7a2a'});}
  return base;
}
function makeBoss(){return {type:'boss',kind:'boss',x:W*0.5+ (Math.random()<.5?-1:1)*W*0.3,y:GY,vy:0,face:-1,
  hp:1000,maxhp:1000,state:'intro',timer:1.4,windup:0,atk:0,stun:0,hurt:0,inv:0,
  legPhase:0,lean:0,dead:0,phase:1,moveT:0,scale:1.9,reach:150,dmg:22,eye:'#ff2a1a',
  cd:1.6,enrage:0};}

//================= 输入 =================//
addEventListener('keydown',e=>{const k=e.key.toLowerCase();
  if(!keys[k]){ keys[k]=true; keyPress(k); }
  if([' ','arrowup','arrowleft','arrowright','arrowdown'].includes(k))e.preventDefault();});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
function keyPress(k){
  if(state===ST.MENU){return;}
  if(k==='p'){ if(state===ST.PLAY)setPause(true); else if(state===ST.PAUSE)setPause(false); return;}
  if(state!==ST.PLAY)return;
  if(k==='w'||k==='arrowup'||k===' ') doJump();
  if(k==='j') doAttack('light');
  if(k==='k') doAttack('heavy');
  if(k==='l'||k==='shift') doDash();
  if(k==='i') doSpecial();
}
// 触摸
function bindHold(id,key){const e=$(id);if(!e)return;
  const dn=ev=>{ev.preventDefault();A();keys[key]=true;};
  const up=ev=>{ev.preventDefault();keys[key]=false;};
  e.addEventListener('touchstart',dn,{passive:false});e.addEventListener('touchend',up,{passive:false});
  e.addEventListener('mousedown',dn);e.addEventListener('mouseup',up);}
function bindTap(id,fn){const e=$(id);if(!e)return;
  const h=ev=>{ev.preventDefault();A();if(state===ST.PLAY)fn();};
  e.addEventListener('touchstart',h,{passive:false});e.addEventListener('mousedown',h);}
bindHold('tL','a'); bindHold('tR','d');
bindTap('tJump',doJump); bindTap('tA',()=>doAttack('light'));
bindTap('tH',()=>doAttack('heavy')); bindTap('tDash',doDash); bindTap('tSp',doSpecial);

//================= 玩家动作 =================//
function doJump(){const p=player;if(p.onGround){p.vy=-560;p.onGround=false;SFX.jump();}}
function doDash(){const p=player;if(p.dashCd>0||p.dash>0)return;
  p.dash=0.22;p.dashCd=0.55;p.inv=0.26;p.vx=p.face*620;SFX.dash();
  for(let i=0;i<10;i++)parts.push({x:p.x,y:p.y-40,vx:-p.face*rand(30,160),vy:rand(-60,20),
    life:.4,max:.4,r:rand(2,5),c:'rgba(180,220,255,'});}
function doAttack(type){const p=player;
  if(p.dash>0)return;
  if(p.atk){ // 连击缓冲
    if(p.atk.type==='light'&&type==='light'&&p.atk.t/p.atk.dur>0.45){ p.atk.next=true; }
    return;
  }
  startAttack(type);
}
function startAttack(type){const p=player;
  p.combo = (p.comboTimer>0&&type==='light')? (p.combo% 3)+1 : (type==='light'?1:0);
  p.comboTimer=0.6;
  const heavy=type==='heavy';
  p.atk={type,t:0,dur:heavy?0.46:0.30,hitAt:heavy?0.34:0.26,hit:false,
    dir:(p.combo%2===0)?-1:1, reach:heavy?118:96, dmg:heavy?26:13,
    kb:heavy?420:150, launch:heavy?-360:0, next:false};
  if(p.onGround) p.vx += p.face*(heavy?60:120);
  SFX.swing();
}
function doSpecial(){const p=player;if(p.qi<60||p.atk)return;
  p.qi-=60; updateHUD();
  p.atk={type:'spin',t:0,dur:0.62,hitAt:0.12,hit:false,dir:1,reach:170,dmg:20,kb:520,launch:-300,ticks:0,next:false};
  SFX.cast(); shake=Math.min(shake+10,18);
  // 法术金光环
  slashes.push({kind:'ring',x:p.x,y:p.y-46,r:30,maxr:200,t:0,life:.5,c:'255,210,90'});
  flashT=0.18;
}

//================= 战斗判定 =================//
function doMelee(p,a){
  const ox=p.x+p.face*a.reach*0.55, oy=p.y-46;
  // 拖尾刀光
  slashes.push({kind:'arc',x:p.x,y:p.y-46,face:p.face,reach:a.reach,
    a0:a.type==='spin'?0:(-p.face*1.1*a.dir), sweep:a.type==='spin'?TAU:(p.face*2.2*a.dir),
    t:0,life:a.type==='heavy'?.28:.2,c:a.type==='heavy'?'255,150,60':'255,225,150',
    w:a.type==='heavy'?26:16});
  let hits=0;
  for(const e of enemies){
    if(e.dead)continue;
    const dx=e.x-p.x, dist=Math.abs(dx), within=dist<a.reach+e.scale*20;
    const sideOk=a.type==='spin'|| (Math.sign(dx)===p.face) || dist<46;
    if(within&&sideOk&&Math.abs((e.y)-(p.y))<120){
      damageEnemy(e,a.dmg+ (p.combo===3?6:0), p.face, a.kb, a.launch);
      hits++;
    }
  }
  if(hits){
    p.combo>0 && (p.comboTimer=0.9);
    addCombo(hits);
    hitstop=a.type==='heavy'?0.10:0.055; shake=Math.min(shake+(a.type==='heavy'?9:5),16);
    p.qi=Math.min(p.maxqi,p.qi+hits*4); updateHUD();
  }
}
function damageEnemy(e,dmg,dir,kb,launch){
  if(e.inv>0)return;
  e.hp-=dmg; e.hurt=0.18; e.inv=0.05; e.stun=Math.max(e.stun,0.18);
  e.x+=dir*6; e.vx=(e.vx||0)+dir*kb; if(launch){e.vy=launch; e.y-=1;}
  SFX.hit();
  for(let i=0;i<10;i++)sparks.push({x:e.x,y:e.y-50,vx:dir*rand(40,360)+rand(-60,60),
    vy:rand(-260,60),life:.35,max:.35,r:rand(1.5,3.5),c:'255,'+randi(170,230)+',90'});
  floats.push({x:e.x,y:e.y-90,vy:-60,txt:Math.round(dmg),life:.7,c:e.type==='boss'?'#ff9a5a':'#ffe08a',big:dmg>20});
  for(let i=0;i<6;i++)parts.push({x:e.x,y:e.y-50,vx:rand(-40,40),vy:rand(-120,-20),life:.5,max:.5,r:rand(2,4),c:'rgba(120,20,20,'});
  if(e.hp<=0&&!e.dead){ killEnemy(e); }
  else if(e.type==='boss'){ updateBossBar(); }
}
function killEnemy(e){
  e.dead=1; e.deadT=0;
  SFX.die();
  for(let i=0;i<26;i++)sparks.push({x:e.x,y:e.y-50,vx:rand(-260,260),vy:rand(-340,40),
    life:rand(.4,.8),max:.8,r:rand(2,5),c:'255,'+randi(120,200)+',60'});
  for(let i=0;i<3;i++)souls.push({x:e.x+rand(-20,20),y:e.y-50,vy:-rand(40,80),vx:rand(-20,20),life:1.4,max:1.4,r:rand(6,12)});
  if(e.type==='boss'){
    addFloat('—— 妖王已诛 ——'); winSequence();
  }
}

//================= 敌人受击的玩家 =================//
function hurtPlayer(dmg,dir){const p=player;
  if(p.inv>0||p.dash>0)return;
  p.hp-=dmg; p.hurt=0.3; p.inv=0.7; p.vx+=dir*200; p.combo=0; p.comboTimer=0;
  SFX.hurt(); shake=Math.min(shake+10,20); flashT=0.12; updateHUD();
  if(p.hp<=0){ p.hp=0; loseSequence(); }
}

//================= 连击 / 飘字 / 横幅 =================//
let comboCount=0, comboHideT=0;
function addCombo(n){ comboCount+=n; $('comboN').textContent=comboCount;
  $('combo').style.opacity=1; comboHideT=1.4;
  $('comboN').style.transform='scale(1.25)'; setTimeout(()=>$('comboN').style.transform='scale(1)',90);
}
function addFloat(t){ banner(t); }
function banner(text,big){const b=$('banner');b.textContent=text;
  b.style.transition='none';b.style.opacity='1';b.style.transform='scale(1.0)';
  requestAnimationFrame(()=>{b.style.transition='opacity 1.2s, transform 1.2s';
    b.style.opacity='0';b.style.transform='scale(1.3)';});}

//================= 关卡 / 波次 =================//
const WAVES=[
  {wolf:3,brute:0,label:'第 一 波'},
  {wolf:4,brute:1,label:'第 二 波'},
  {wolf:3,brute:2,label:'第 三 波'},
];
let spawnQueue=[], waveEnding=false, bossSummoned=false;
function startGame(){
  A(); state=ST.PLAY;
  player=makePlayer(); enemies=[]; slashes=[];parts=[];sparks=[];floats=[];souls=[];
  boss=null; waveIdx=0; comboCount=0; gameTime=0; timeScale=1; hitstop=0; shake=0;
  spawnQueue=[]; waveEnding=false; bossSummoned=false;
  genMountains(); initEmbers();
  $('start').classList.add('hide'); $('over').classList.add('hide'); $('pause').classList.add('hide');
  $('bossWrap').classList.remove('on');
  updateHUD();
  startWave(0);
}
function startWave(i){
  waveIdx=i; waveEnding=false;
  if(i>=WAVES.length){ summonBoss(); return; }
  const w=WAVES[i];
  banner(w.label);
  let delay=0.7;
  const push=(kind)=>{ spawnQueue.push({kind,t:delay}); delay+=rand(.45,.8); };
  for(let n=0;n<w.wolf;n++) push('wolf');
  for(let n=0;n<w.brute;n++) push('brute');
}
function summonBoss(){
  if(bossSummoned) return; bossSummoned=true;
  banner('妖 王 降 临',true); SFX.boss(); shake=Math.min(shake+16,22); flashT=0.3;
  spawnQueue.push({kind:'boss',t:0.8});
}
function processSpawns(dt){
  for(let i=spawnQueue.length-1;i>=0;i--){
    const s=spawnQueue[i]; s.t-=dt;
    if(s.t<=0){
      spawnQueue.splice(i,1);
      if(s.kind==='boss'){ boss=makeBoss(); enemies.push(boss);
        $('bossName').textContent='妖 王 · 玄 狼'; $('bossWrap').classList.add('on'); updateBossBar(); }
      else { const fromLeft=Math.random()<.5; enemies.push(makeDemon(fromLeft?-40:W+40,s.kind)); }
    }
  }
}
function checkWaveClear(){
  if(boss||bossSummoned||waveEnding) return;
  if(spawnQueue.length>0) return;
  if(enemies.some(e=>!e.dead)) return;
  waveEnding=true;
  setTimeout(()=>{ if(state===ST.PLAY) startWave(waveIdx+1); },800);
}

//================= 更新 =================//
function update(dt,dtReal){
  gameTime+=dt;
  processSpawns(dt);
  // 玩家
  const p=player;
  let mv=0; if(keys['a']||keys['arrowleft'])mv-=1; if(keys['d']||keys['arrowright'])mv+=1;
  if(p.dash<=0){
    if(mv!==0){ p.face=mv; p.vx=lerp(p.vx,mv*250,Math.min(1,dt*12)); p.state='run'; }
    else { p.vx=lerp(p.vx,0,Math.min(1,dt*14)); if(p.onGround)p.state='idle'; }
  }
  p.vy+=1500*dt; p.y+=p.vy*dt; p.x+=p.vx*dt;
  if(p.y>=GY){ p.y=GY; if(!p.onGround){p.onGround=true; for(let i=0;i<6;i++)parts.push({x:p.x,y:GY,vx:rand(-90,90),vy:rand(-40,-5),life:.4,max:.4,r:rand(2,4),c:'rgba(120,90,60,'});} p.vy=0; }
  else p.onGround=false;
  p.x=clamp(p.x,30,W-30);
  if(p.dash>0){p.dash-=dt; p.state='dash'; if(p.dash<=0)p.vx*=0.3;}
  if(p.dashCd>0)p.dashCd-=dt;
  if(p.inv>0)p.inv-=dt;
  if(p.hurt>0)p.hurt-=dt;
  if(p.comboTimer>0){p.comboTimer-=dt; if(p.comboTimer<=0)p.combo=0;}
  if(p.qi<p.maxqi){ p.qi=Math.min(p.maxqi,p.qi+dt*6); updateHUD(); }
  // 攻击推进
  if(p.atk){ const a=p.atk; a.t+=dt; const k=a.t/a.dur; p.state='attack';
    if(!a.hit&&k>=a.hitAt){ a.hit=true; doMelee(p,a); }
    if(a.type==='spin'){ a.ticks=a.ticks||0; if(k>0.15&&k<0.9&&a.t> (a.ticks+1)*0.13){ a.ticks++; doMelee(p,a); } }
    if(k>=1){ const wasNext=a.next&&a.type==='light'; p.atk=null; if(wasNext) startAttack('light'); }
  }
  // 动画相位
  p.legPhase += (Math.abs(p.vx)*0.012+ (p.state==='run'?0.18:0.04));
  p.lean=lerp(p.lean, p.state==='attack'?p.face*0.5: (p.state==='run'?p.face*0.22:0), Math.min(1,dt*10));

  // 敌人
  for(const e of enemies){
    if(e.dead){ e.deadT+=dt; continue; }
    e.legPhase+=Math.abs(e.vx||0)*0.01+ (e.state==='walk'?0.14*e.speed/70:0.03);
    if(e.hurt>0)e.hurt-=dt; if(e.inv>0)e.inv-=dt; if(e.stun>0)e.stun-=dt;
    // 物理
    e.vx=(e.vx||0); e.vy=(e.vy||0);
    e.vy+=1500*dt; e.y+=e.vy*dt;
    if(e.y>=GY){e.y=GY;e.vy=0;}
    e.x+=e.vx*dt; e.vx=lerp(e.vx,0,Math.min(1,dt*6));
    e.x=clamp(e.x,10,W-10);
    if(e.stun>0){ continue; }
    if(e.type==='boss'){ updateBoss(e,dt); continue; }
    // 普通妖 AI
    const dx=player.x-e.x, dist=Math.abs(dx);
    e.face=dx>=0?1:-1;
    if(e.state==='walk'){
      if(dist>e.reach){ e.x+=e.face*e.speed*dt; }
      else { e.state='windup'; e.windup=0.45; }
    } else if(e.state==='windup'){
      e.windup-=dt; e.lean=lerp(e.lean,-e.face*0.3,Math.min(1,dt*10));
      if(e.windup<=0){ e.state='attack'; e.atk=0.32;
        if(dist<e.reach+30){ setTimeout(()=>{},0); } }
    } else if(e.state==='attack'){
      e.atk-=dt; e.lean=lerp(e.lean,e.face*0.5,Math.min(1,dt*16));
      if(!e.didHit&&e.atk<0.18){ e.didHit=true;
        if(Math.abs(player.x-e.x)<e.reach+40 && Math.abs(player.y-e.y)<120) hurtPlayer(e.dmg,e.face); }
      if(e.atk<=0){ e.state='cool'; e.cool=0.5; e.didHit=false; }
    } else if(e.state==='cool'){ e.cool-=dt; e.lean=lerp(e.lean,0,Math.min(1,dt*10)); if(e.cool<=0)e.state='walk'; }
  }
  // 清理死亡
  for(let i=enemies.length-1;i>=0;i--){ const e=enemies[i]; if(e.dead&&e.deadT>0.9){ if(e===boss)boss=null; enemies.splice(i,1);} }
  checkWaveClear();

  // 刀光/法环
  for(let i=slashes.length-1;i>=0;i--){const s=slashes[i];s.t+=dt; if(s.t>=s.life)slashes.splice(i,1);}
  // 粒子
  for(let i=parts.length-1;i>=0;i--){const q=parts[i];q.x+=q.vx*dt;q.y+=q.vy*dt;q.vy+=600*dt;q.life-=dt;if(q.life<=0)parts.splice(i,1);}
  for(let i=sparks.length-1;i>=0;i--){const q=sparks[i];q.x+=q.vx*dt;q.y+=q.vy*dt;q.vy+=900*dt;q.vx*=.92;q.life-=dt;if(q.life<=0)sparks.splice(i,1);}
  for(let i=souls.length-1;i>=0;i--){const q=souls[i];q.x+=q.vx*dt;q.y+=q.vy*dt;q.vx+=Math.sin(gameTime*4+q.y)*8*dt;q.life-=dt;if(q.life<=0)souls.splice(i,1);}
  for(let i=floats.length-1;i>=0;i--){const q=floats[i];q.y+=q.vy*dt;q.vy+=40*dt;q.life-=dt;if(q.life<=0)floats.splice(i,1);}
  // 余烬
  for(const em of embers){ em.y+=em.vy*dt; em.x+=em.vx*dt+Math.sin(gameTime+em.tw)*6*dt; em.tw+=dt;
    if(em.y<-10){ Object.assign(em,mkEmber(false)); } }

  // 连击隐藏
  if(comboHideT>0){comboHideT-=dtReal; if(comboHideT<=0){$('combo').style.opacity=0; comboCount=0;}}
  // 镜头
  if(shake>0) shake=Math.max(0,shake-dtReal*32);
  timeScale=lerp(timeScale,1,Math.min(1,dtReal*3));
  if(flashT>0){flashT-=dtReal; $('flash').style.opacity=Math.max(0,flashT*2.2);}
}

//================= 妖王 AI =================//
function updateBoss(b,dt){
  if(b.hurt>0)b.hurt-=dt;
  const dx=player.x-b.x, dist=Math.abs(dx);
  b.face=dx>=0?1:-1;
  if(b.phase===1 && b.hp<=b.maxhp*0.5){ b.phase=2; b.enrage=1.2; banner('狂 暴', true); SFX.boss(); shake+=14; b.cd=0.9; }
  if(b.enrage>0)b.enrage-=dt;
  if(b.state==='intro'){ b.timer-=dt; b.lean=lerp(b.lean,0,dt*4); if(b.timer<=0)b.state='idle'; return; }
  if(b.state==='idle'){
    b.cd-=dt; b.moveT+=dt;
    if(dist>b.reach*0.9){ b.x+=b.face*(b.phase===2?150:95)*dt; }
    if(b.cd<=0){ // 选招
      const r=Math.random();
      if(dist<b.reach+60 || r<0.45){ b.state='slamWind'; b.timer=b.phase===2?0.5:0.7; }
      else { b.state='chargeWind'; b.timer=0.6; }
    }
  } else if(b.state==='slamWind'){ b.timer-=dt; b.lean=lerp(b.lean,-b.face*0.4,dt*8);
    if(b.timer<=0){ b.state='slam'; b.timer=0.26; b.did=false; }
  } else if(b.state==='slam'){ b.timer-=dt; b.lean=lerp(b.lean,b.face*0.3,dt*18);
    if(!b.did&&b.timer<0.16){ b.did=true; bossSlam(b); }
    if(b.timer<=0){ b.state='idle'; b.cd=b.phase===2?0.9:1.5; }
  } else if(b.state==='chargeWind'){ b.timer-=dt; b.lean=lerp(b.lean,-b.face*0.5,dt*8);
    if(b.timer<=0){ b.state='charge'; b.timer=0.7; b.vx=b.face*(b.phase===2?760:560); b.did=false; }
  } else if(b.state==='charge'){ b.timer-=dt; b.x+=b.vx*dt; b.vx=lerp(b.vx,0,dt*1.5);
    if(!b.did&&Math.abs(player.x-b.x)<b.reach&&Math.abs(player.y-b.y)<150){ b.did=true; hurtPlayer(b.dmg,b.face); }
    b.x=clamp(b.x,40,W-40);
    if(b.timer<=0){ b.state='idle'; b.cd=b.phase===2?1.0:1.7; }
  }
}
function bossSlam(b){
  SFX.heavy(); shake=Math.min(shake+16,24); hitstop=0.08; flashT=0.14;
  // 冲击波
  slashes.push({kind:'shock',x:b.x,y:GY,r:20,maxr:W*0.6,t:0,life:.6,c:'255,120,60'});
  for(let i=0;i<24;i++)parts.push({x:b.x+rand(-40,40),y:GY,vx:rand(-300,300),vy:rand(-360,-40),life:.7,max:.7,r:rand(3,7),c:'rgba(150,90,50,'});
  // 落地未跳 -> 受伤
  if(player.onGround && Math.abs(player.x-b.x)<W*0.42){ hurtPlayer(b.dmg+4, player.x<b.x?-1:1); }
}
function updateBossBar(){ if(boss)$('bossFill').style.width=clamp(boss.hp/boss.maxhp*100,0,100)+'%'; }

//================= 渲染 =================//
function render(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  // 镜头抖动
  const sx=shake?rand(-shake,shake):0, sy=shake?rand(-shake,shake):0;
  ctx.save(); ctx.translate(sx,sy);
  drawBackground();
  // 地面阴影排序：按 y 由远及近
  const ents=[player,...enemies.filter(e=>e!==player)].filter(Boolean);
  ents.sort((a,b)=>a.y-b.y);
  // 地面接触阴影
  for(const e of ents) drawShadow(e);
  drawGroundFog();
  // 法术冲击波（地面层）
  for(const s of slashes) if(s.kind==='shock'||s.kind==='ring') drawSlash(s);
  // 魂火
  ctx.globalCompositeOperation='lighter';
  for(const q of souls){const a=clamp(q.life/q.max,0,1);
    const g=ctx.createRadialGradient(q.x,q.y,0,q.x,q.y,q.r*2);
    g.addColorStop(0,`rgba(150,230,255,${a*.8})`);g.addColorStop(1,'rgba(80,160,255,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(q.x,q.y,q.r*2,0,TAU);ctx.fill();}
  ctx.globalCompositeOperation='source-over';
  // 角色
  for(const e of ents){ if(e===player) drawWukong(e); else if(e.type==='boss') drawBoss(e); else drawDemon(e); }
  // 刀光（角色层之上）
  for(const s of slashes) if(s.kind==='arc') drawSlash(s);
  // 火花/粒子
  drawParticles();
  // 飘字
  ctx.textAlign='center';
  for(const q of floats){const a=clamp(q.life/0.7,0,1);
    ctx.font=`700 ${q.big?34:24}px "Songti SC",serif`;
    ctx.fillStyle='rgba(0,0,0,'+a*.6+')'; ctx.fillText(q.txt,q.x+2,q.y+2);
    ctx.fillStyle=q.c.replace(')',','+a+')').replace('#','rgba(').length? hexA(q.c,a):q.c;
    ctx.fillStyle=hexA(q.c,a); ctx.fillText(q.txt,q.x,q.y);}
  // 余烬（前景）
  drawEmbers();
  ctx.restore();
  // 色调
  drawGrade();
}
function hexA(hex,a){ if(hex[0]!=='#')return hex; const n=parseInt(hex.slice(1),16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }

function drawBackground(){
  // 天空
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0916');g.addColorStop(.42,'#1d1228');g.addColorStop(.72,'#3a1620');g.addColorStop(1,'#5a1e18');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // 血月
  const mx=W*0.74,my=H*0.24,mr=Math.min(W,H)*0.11;
  const mg=ctx.createRadialGradient(mx,my,0,mx,my,mr*3.2);
  mg.addColorStop(0,'rgba(255,180,120,.5)');mg.addColorStop(.25,'rgba(220,90,50,.28)');mg.addColorStop(1,'rgba(180,40,30,0)');
  ctx.fillStyle=mg;ctx.beginPath();ctx.arc(mx,my,mr*3.2,0,TAU);ctx.fill();
  const mg2=ctx.createRadialGradient(mx-mr*.3,my-mr*.3,mr*.2,mx,my,mr);
  mg2.addColorStop(0,'#ffe8c8');mg2.addColorStop(.6,'#ff9a5a');mg2.addColorStop(1,'#d8542a');
  ctx.fillStyle=mg2;ctx.beginPath();ctx.arc(mx,my,mr,0,TAU);ctx.fill();
  // 远山（三层视差）
  const cols=['#15101e','#100b18','#0a0712'];
  for(let li=0;li<mountains.length;li++){
    const m=mountains[li]; const yb=GY+ (li)* (H*0.0);
    ctx.fillStyle=cols[li]; ctx.beginPath(); ctx.moveTo(-50,GY+60);
    let topY=GY;
    for(const pt of m.pts){ const ph=GY - pt.h*H; topY=ph; ctx.lineTo(pt.x, ph); }
    ctx.lineTo(W+60,GY+60); ctx.closePath(); ctx.fill();
  }
  // 体积雾带
  ctx.globalCompositeOperation='screen';
  for(let i=0;i<4;i++){const yy=GY-40- i*40 + Math.sin(gameTime*0.3+i)*8;
    const fg=ctx.createLinearGradient(0,yy-30,0,yy+30);
    fg.addColorStop(0,'rgba(200,120,80,0)');fg.addColorStop(.5,`rgba(210,120,70,${0.05-i*0.008})`);fg.addColorStop(1,'rgba(200,120,80,0)');
    ctx.fillStyle=fg;ctx.fillRect(0,yy-30,W,60);}
  ctx.globalCompositeOperation='source-over';
  // 地面
  const gg=ctx.createLinearGradient(0,GY-10,0,H);
  gg.addColorStop(0,'#1a0f12');gg.addColorStop(.3,'#0d080c');gg.addColorStop(1,'#050308');
  ctx.fillStyle=gg; ctx.fillRect(0,GY,W,H-GY);
  // 地面高光线（月光）
  ctx.strokeStyle='rgba(255,150,90,.10)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,GY);ctx.lineTo(W,GY);ctx.stroke();
}
function drawGroundFog(){
  ctx.globalCompositeOperation='screen';
  const fg=ctx.createLinearGradient(0,GY-6,0,GY+30);
  fg.addColorStop(0,'rgba(255,140,80,0.10)');fg.addColorStop(1,'rgba(255,140,80,0)');

function drawShadow(e){
  const sc=e.scale||1; const w=42*sc*(e.type==='boss'?1.3:1);
  const lift=clamp((GY-e.y)/120,0,1);

//------ 角色：剪影 + 描金 + 发光 ------//
function limb(x1,y1,x2,y2,w,col){ctx.strokeStyle=col;ctx.lineWidth=w;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
function rig(e,opt){
  // 返回关节坐标（侧视）。e.y 为脚底
  const sc=e.scale||1, f=e.face, lean=e.lean||0;
  const H0= (opt.h||92)*sc;
  const feetY=e.y;
  const hipY=feetY-H0*0.46, hipX=e.x+lean*10;
  const shY=hipY-H0*0.34, shX=hipX+lean*8;
  const headY=shY-H0*0.16, headX=shX+lean*5;
  // 腿（走路相位）
  const ph=e.legPhase||0, sw=(e.state==='run'||e.state==='walk')?Math.sin(ph)*H0*0.16:Math.sin(ph)*H0*0.03;
  const air=!e.onGround&&e.type!=='boss'? -1:0;
  return {f,sc,H0,hipX,hipY,shX,shY,headX,headY,
    foot1:{x:hipX+sw, y:feetY}, foot2:{x:hipX-sw, y:feetY},
    knee1:{x:hipX+sw*0.5+f*4, y:(hipY+feetY)/2}, knee2:{x:hipX-sw*0.5+f*4, y:(hipY+feetY)/2}};
}
function drawWukong(p){

  aura.addColorStop(0,`rgba(255,196,96,${ap})`); aura.addColorStop(1,'rgba(255,150,60,0)');

  fg.addColorStop(0,'rgba(255,180,80,.22)'); fg.addColorStop(1,'rgba(255,180,80,0)');
  ctx.fillStyle=fg; ctx.beginPath(); ctx.ellipse(p.x,GY,46,10,0,0,TAU); ctx.fill();
  ctx.globalCompositeOperation='source-over';

  // 躯干
  limb(R.hipX,R.hipY,R.shX,R.shY,22*sc,body);
  // 披风/虎皮裙暗示
  ctx.fillStyle='#1a0e0a';
  ctx.beginPath();ctx.moveTo(R.hipX-12*sc,R.hipY-6);ctx.lineTo(R.hipX+12*sc,R.hipY-6);
  ctx.lineTo(R.hipX+9*sc,R.hipY+18*sc);ctx.lineTo(R.hipX-9*sc,R.hipY+18*sc);ctx.closePath();ctx.fill();
  // 头 + 金箍 + 翎羽
  ctx.fillStyle=body;ctx.beginPath();ctx.arc(R.headX,R.headY,11*sc,0,TAU);ctx.fill();
  // 金箍
  ctx.strokeStyle='#ffcf5a';ctx.lineWidth=2.4*sc;ctx.beginPath();ctx.arc(R.headX,R.headY,10.5*sc,-2.4,2.4);ctx.stroke();
  // 两根翎羽
  ctx.strokeStyle='#e8b85a';ctx.lineWidth=2*sc;
  for(const d of [-1,1]){ctx.beginPath();ctx.moveTo(R.headX,R.headY-9*sc);
    ctx.quadraticCurveTo(R.headX+d*6*sc-f*4,R.headY-30*sc,R.headX+d*2*sc-f*16,R.headY-40*sc);ctx.stroke();}
  // 手臂 + 金箍棒
  let staffAng;
  if(p.atk){ const k=p.atk.t/p.atk.dur;
    if(p.atk.type==='spin') staffAng=k*TAU*1.4;
    else staffAng = lerp(-f*1.4*p.atk.dir, f*1.5*p.atk.dir, clamp((k-0.1)/0.6,0,1));
  } else { staffAng = f*0.5 + Math.sin(gameTime*2)*0.06; }
  const handX=R.shX+f*6*sc, handY=R.shY+10*sc;
  const L=70*sc;
  const ex=Math.sin(staffAng), ey=-Math.cos(staffAng);
  const s1x=handX-ex*L*0.4, s1y=handY-ey*L*0.4, s2x=handX+ex*L*0.7, s2y=handY+ey*L*0.7;
  // 棒的辉光拖尾
  if(p.atk){ ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle='rgba(255,200,90,.5)';ctx.lineWidth=12*sc;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(s1x,s1y);ctx.lineTo(s2x,s2y);ctx.stroke();
    ctx.globalCompositeOperation='source-over'; }
  // 手臂
  limb(R.shX,R.shY,handX,handY,9*sc,body);
  // 金箍棒
  const sg=ctx.createLinearGradient(s1x,s1y,s2x,s2y);
  sg.addColorStop(0,'#7a5a1a');sg.addColorStop(.5,'#ffe49a');sg.addColorStop(1,'#c8901e');
  ctx.strokeStyle=sg;ctx.lineWidth=6.5*sc;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(s1x,s1y);ctx.lineTo(s2x,s2y);ctx.stroke();
  // 棒两端金箍
  ctx.strokeStyle='#fff3cf';ctx.lineWidth=7.5*sc;
  ctx.beginPath();ctx.moveTo(s2x-ex*5,s2y-ey*5);ctx.lineTo(s2x,s2y);ctx.stroke();
  // 描金边光（右上缘）
  rimLight(R,f,sc,'rgba(255,196,110,0.5)');
  // 眼神金光
  ctx.globalCompositeOperation='lighter';
  ctx.fillStyle='rgba(255,210,120,.9)';ctx.beginPath();ctx.arc(R.headX+f*4*sc,R.headY,1.8*sc,0,TAU);ctx.fill();
  ctx.globalCompositeOperation='source-over';
}
function rimLight(R,f,sc,col){
  ctx.strokeStyle=col;ctx.lineWidth=2*sc;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(R.hipX+f*9*sc,R.hipY);ctx.lineTo(R.shX+f*10*sc,R.shY);ctx.stroke();
  ctx.beginPath();ctx.arc(R.headX,R.headY,11*sc,-1.2+ (f>0?0:0), 1.2,false);ctx.stroke();
}
function drawDemon(e){
  const R=rig(e,{h:e.kind==='brute'?108:84}); const f=e.face, sc=e.scale;
  const body = e.hurt>0? '#5a1414' : (e.kind==='brute'?'#171019':'#0e0b14');
  // 腿
  limb(R.hipX,R.hipY,R.foot2.x,R.foot2.y,10*sc,body);
  limb(R.hipX,R.hipY,R.foot1.x,R.foot1.y,10*sc,body);
  // 躯干（前倾兽形）
  limb(R.hipX,R.hipY,R.shX,R.shY,20*sc,body);
  // 头（狼首：前突）
  const hx=R.headX+f*6*sc, hy=R.headY+3*sc;
  ctx.fillStyle=body;ctx.beginPath();ctx.arc(hx,hy,10*sc,0,TAU);ctx.fill();
  // 吻部
  ctx.beginPath();ctx.moveTo(hx,hy-5*sc);ctx.lineTo(hx+f*16*sc,hy);ctx.lineTo(hx,hy+5*sc);ctx.closePath();ctx.fill();
  // 耳
  ctx.beginPath();ctx.moveTo(hx-f*4*sc,hy-9*sc);ctx.lineTo(hx-f*2*sc,hy-18*sc);ctx.lineTo(hx+f*3*sc,hy-9*sc);ctx.closePath();ctx.fill();
  // 武器：弯刀
  const swing=e.state==='attack'? f*1.0 : (e.state==='windup'? -f*0.6 : f*0.3);
  const hX=R.shX+f*8*sc,hY=R.shY+8*sc;
  limb(R.shX,R.shY,hX,hY,8*sc,body);
  ctx.strokeStyle='#9aa6b0';ctx.lineWidth=3*sc;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(hX,hY);ctx.quadraticCurveTo(hX+f*22*sc*Math.cos(swing),hY-26*sc, hX+f*30*sc*Math.cos(swing),hY-14*sc-30*sc*Math.sin(Math.abs(swing)));ctx.stroke();
  // 冷色边光
  rimLight(R,f,sc, e.kind==='brute'?'rgba(255,140,80,.4)':'rgba(120,160,210,.4)');
  // 红眼
  ctx.globalCompositeOperation='lighter';
  const eg=ctx.createRadialGradient(hx+f*3*sc,hy-1,0,hx+f*3*sc,hy-1,5*sc);
  eg.addColorStop(0,e.eye);eg.addColorStop(1,'rgba(255,40,30,0)');
  ctx.fillStyle=eg;ctx.beginPath();ctx.arc(hx+f*3*sc,hy-1,5*sc,0,TAU);ctx.fill();
  ctx.globalCompositeOperation='source-over';
  // windup 红光预警
  if(e.state==='windup'){ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle='rgba(255,60,40,'+(0.4+0.3*Math.sin(gameTime*30))+')';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(e.x,e.y-R.H0*0.5,R.H0*0.6,0,TAU);ctx.stroke();
    ctx.globalCompositeOperation='source-over';}
}
function drawBoss(b){
  const R=rig(b,{h:150}); const f=b.face, sc=b.scale;
  const body=b.hurt>0?'#4a1414':'#0b0810';
  // 狂暴气场
  if(b.phase===2){ctx.globalCompositeOperation='lighter';
    const ag=ctx.createRadialGradient(b.x,b.y-90,10,b.x,b.y-90,140);
    ag.addColorStop(0,'rgba(255,60,30,.18)');ag.addColorStop(1,'rgba(255,60,30,0)');
    ctx.fillStyle=ag;ctx.beginPath();ctx.arc(b.x,b.y-90,140,0,TAU);ctx.fill();
    ctx.globalCompositeOperation='source-over';}
  limb(R.hipX,R.hipY,R.foot2.x,R.foot2.y,18*sc,body);
  limb(R.hipX,R.hipY,R.foot1.x,R.foot1.y,18*sc,body);
  limb(R.hipX,R.hipY,R.shX,R.shY,36*sc,body);
  // 肩甲
  ctx.fillStyle='#1a1018';
  ctx.beginPath();ctx.ellipse(R.shX-f*16*sc,R.shY,14*sc,10*sc,0,0,TAU);ctx.fill();
  ctx.beginPath();ctx.ellipse(R.shX+f*16*sc,R.shY,14*sc,10*sc,0,0,TAU);ctx.fill();
  // 头 + 双角
  const hx=R.headX+f*4*sc,hy=R.headY;
  ctx.fillStyle=body;ctx.beginPath();ctx.arc(hx,hy,17*sc,0,TAU);ctx.fill();
  ctx.strokeStyle='#1c1116';ctx.lineWidth=7*sc;ctx.lineCap='round';
  for(const d of [-1,1]){ctx.beginPath();ctx.moveTo(hx+d*8*sc,hy-10*sc);
    ctx.quadraticCurveTo(hx+d*26*sc,hy-30*sc,hx+d*16*sc,hy-44*sc);ctx.stroke();}
  // 巨刃/巨棍
  const hX=R.shX+f*20*sc,hY=R.shY+10*sc; limb(R.shX,R.shY,hX,hY,16*sc,body);
  let bang= b.state==='slam'? f*1.2 : (b.state.includes('Wind')? -f*0.8 : f*0.4);
  ctx.strokeStyle='#3a2a3a';ctx.lineWidth=10*sc;ctx.lineCap='round';
  const wx=hX+f*60*sc*Math.cos(bang), wy=hY-70*sc*Math.cos(bang*0.4)-20*sc;
  ctx.beginPath();ctx.moveTo(hX,hY);ctx.lineTo(wx,wy);ctx.stroke();
  ctx.strokeStyle='#6a4a6a';ctx.lineWidth=4*sc;ctx.beginPath();ctx.moveTo(hX,hY);ctx.lineTo(wx,wy);ctx.stroke();
  // 边光（暖红）
  rimLight(R,f,sc,'rgba(255,90,50,.5)');
  // 双目
  ctx.globalCompositeOperation='lighter';
  for(const d of [-1,1]){const ex=hx+f*4*sc+d*4*sc;
    const eg=ctx.createRadialGradient(ex,hy-2,0,ex,hy-2,7*sc);
    eg.addColorStop(0,'#ff6a3a');eg.addColorStop(1,'rgba(255,40,20,0)');
    ctx.fillStyle=eg;ctx.beginPath();ctx.arc(ex,hy-2,7*sc,0,TAU);ctx.fill();}
  ctx.globalCompositeOperation='source-over';
  if(b.state.includes('Wind')){ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle='rgba(255,70,40,'+(0.4+0.35*Math.sin(gameTime*26))+')';ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(b.x,b.y-100,120,0,TAU);ctx.stroke();
    ctx.globalCompositeOperation='source-over';}
}

//------ 刀光 / 法术 ------//
function drawSlash(s){
  const k=s.t/s.life, a=1-k;
  ctx.globalCompositeOperation='lighter';
  if(s.kind==='arc'){
    const start=s.a0 - Math.PI/2, end=s.a0+s.sweep - Math.PI/2;
    const r=s.reach*(0.7+k*0.5);
    const grd=ctx.createRadialGradient(s.x,s.y,r*0.4,s.x,s.y,r);
    grd.addColorStop(0,`rgba(${s.c},0)`);grd.addColorStop(1,`rgba(${s.c},${a*0.9})`);
    ctx.strokeStyle=`rgba(${s.c},${a})`; ctx.lineWidth=s.w*(1-k*0.5); ctx.lineCap='round';
    ctx.beginPath();ctx.arc(s.x,s.y,r,start,end,end<start);ctx.stroke();
    // 内侧亮芯
    ctx.strokeStyle=`rgba(255,255,235,${a*0.7})`; ctx.lineWidth=s.w*0.3*(1-k);
    ctx.beginPath();ctx.arc(s.x,s.y,r,start,end,end<start);ctx.stroke();
  } else if(s.kind==='ring'){
    const r=lerp(s.r,s.maxr,k);
    ctx.strokeStyle=`rgba(${s.c},${a})`;ctx.lineWidth=14*(1-k);
    ctx.beginPath();ctx.arc(s.x,s.y,r,0,TAU);ctx.stroke();
  } else if(s.kind==='shock'){
    const r=lerp(s.r,s.maxr,k);
    ctx.strokeStyle=`rgba(${s.c},${a*0.8})`;ctx.lineWidth=10*(1-k);
    ctx.beginPath();ctx.ellipse(s.x,GY,r,r*0.18,0,0,TAU);ctx.stroke();
    ctx.strokeStyle=`rgba(255,230,180,${a*0.5})`;ctx.lineWidth=4*(1-k);
    ctx.beginPath();ctx.ellipse(s.x,GY,r*0.92,r*0.16,0,0,TAU);ctx.stroke();
  }
  ctx.globalCompositeOperation='source-over';
}
function drawParticles(){
  ctx.globalCompositeOperation='lighter';
  for(const q of sparks){const a=clamp(q.life/q.max,0,1);
    ctx.fillStyle=`rgba(${q.c},${a})`;ctx.beginPath();ctx.arc(q.x,q.y,q.r,0,TAU);ctx.fill();}
  ctx.globalCompositeOperation='source-over';
  for(const q of parts){const a=clamp(q.life/q.max,0,1);
    ctx.fillStyle=(q.c[0]==='r')? q.c+a+')' : q.c; ctx.beginPath();ctx.arc(q.x,q.y,q.r,0,TAU);ctx.fill();}
}
function drawEmbers(){
  ctx.globalCompositeOperation='lighter';
  for(const em of embers){const tw=0.5+0.5*Math.sin(em.tw*4);
    ctx.fillStyle=`rgba(255,${160+ (em.r*30|0)},90,${em.a*tw*0.8})`;
    ctx.beginPath();ctx.arc(em.x,em.y,em.r,0,TAU);ctx.fill();}
  ctx.globalCompositeOperation='source-over';
}
function drawGrade(){
  // 暖冷分离色调
  ctx.globalCompositeOperation='soft-light';
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'rgba(40,60,120,0.35)');g.addColorStop(1,'rgba(120,40,20,0.35)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='source-over';
}

//================= HUD =================//
function updateHUD(){const p=player; if(!p)return;
  $('hpFill').style.width=clamp(p.hp/p.maxhp*100,0,100)+'%';
  $('qiFill').style.width=clamp(p.qi/p.maxqi*100,0,100)+'%';
  $('hpNum').textContent=Math.max(0,Math.round(p.hp))+' / '+p.maxhp;
}
function setPause(on){ if(on){state=ST.PAUSE;$('pause').classList.remove('hide');}
  else{state=ST.PLAY;$('pause').classList.add('hide');} }

//================= 结束 =================//
function winSequence(){ timeScale=0.25; flashT=0.4; shake=Math.min(shake+18,26); SFX.win();
  setTimeout(()=>{ state=ST.OVER; $('overTitle').textContent='胜';
    $('overSub').textContent='VICTORY';
    $('overMsg').innerHTML='妖王玄狼授首，血月退散。<br>最大连击 <b style="color:#ffd24a">'+comboCount+'</b>';
    $('over').classList.remove('hide'); $('bossWrap').classList.remove('on'); },1400); }
function loseSequence(){ timeScale=0.3; flashT=0.5; shake=Math.min(shake+16,24); SFX.die();
  setTimeout(()=>{ state=ST.OVER; $('overTitle').textContent='败';
    $('overSub').textContent='FALLEN'; $('overMsg').textContent='大圣陨落于血月之下……卷土重来。';
    $('over').classList.remove('hide'); $('bossWrap').classList.remove('on'); },900); }

$('startBtn').onclick=startGame; $('againBtn').onclick=startGame; $('resumeBtn').onclick=()=>setPause(false);

//================= 主循环 =================//
let last=performance.now();
function frame(t){
  const dtReal=clamp((t-last)/1000,0,0.05); last=t;
  if(hitstop>0) hitstop-=dtReal;
  const dt = (hitstop>0)?0:dtReal*timeScale;
  if(state===ST.PLAY) update(dt,dtReal);
  else if(state===ST.MENU){ gameTime+=dtReal; for(const em of embers){em.y+=em.vy*dtReal;em.x+=em.vx*dtReal;if(em.y<-10)Object.assign(em,mkEmber(false));} }
  if(state===ST.PLAY||state===ST.PAUSE||state===ST.OVER) render();
  else renderMenu();
  requestAnimationFrame(frame);
}
function renderMenu(){ ctx.setTransform(DPR,0,0,DPR,0,0); ctx.save(); drawBackground(); drawEmbers(); ctx.restore(); drawGrade(); }
genMountains(); initEmbers();
requestAnimationFrame(frame);
</script>
